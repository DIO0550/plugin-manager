<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task: {目的を簡潔に記述}</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Task: {目的を簡潔に記述}</h1>
</header>

<section class="section">
  <h2>Research &amp; Planning</h2>
  <ul class="task-list">
    <li><span class="checkbox"></span>{調査・計画タスク1}</li>
    <li><span class="checkbox"></span>{調査・計画タスク2}</li>
    <li><span class="checkbox"></span>{調査・計画タスク3}</li>
  </ul>
</section>

<section class="section">
  <h2>Implementation</h2>
  <ul class="task-list">
    <li><span class="checkbox"></span>{実装タスク1}</li>
    <li><span class="checkbox"></span>{実装タスク2}</li>
    <li><span class="checkbox"></span>{実装タスク3}</li>
    <li><span class="checkbox"></span>{実装タスク4}</li>
  </ul>
</section>

<section class="section">
  <h2>Verification</h2>
  <ul class="task-list">
    <li><span class="checkbox"></span>{検証タスク1}</li>
    <li><span class="checkbox"></span>{検証タスク2}</li>
    <li><span class="checkbox"></span>{検証タスク3}</li>
  </ul>
</section>

</body>
</html>
